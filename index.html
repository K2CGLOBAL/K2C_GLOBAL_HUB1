<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K2C GLOBAL HUB</title>
<link rel="stylesheet" href="style.css">
<script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>
<header>
<h1>K2C GLOBAL HUB</h1>
<p>Buy quality products directly and pay easily!</p>
</header>

<main>
<section id="products" class="products"></section>
<div style="background:#fff; padding:15px; margin:20px; border-radius:10px;">
  <h2>Customer Details</h2>

  <input id="cust-name" type="text" placeholder="Enter your full name"
  style="width:100%; padding:10px; margin-bottom:10px;" />

  <input id="cust-phone" type="text" placeholder="Enter your phone number"
  style="width:100%; padding:10px; margin-bottom:10px;" />
</div>
<section id="cart">
<h2>Cart</h2>
<div id="cart-items"></div>
<button id="checkout">Checkout</button>
</section>
</main>

<script src="script.js"></script>
</body>
</html>
